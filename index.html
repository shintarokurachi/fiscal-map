<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>財政指標マップ（令和６年度）</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"><\/script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { display:flex; height:100vh; font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',sans-serif; background:#f0f0f0; }
    #map { flex:1; }
    #panel {
      width:300px; min-width:300px; background:#fff;
      box-shadow:-3px 0 12px rgba(0,0,0,0.15);
      display:flex; flex-direction:column; overflow:hidden; z-index:1000;
    }
    #panel-header {
      background:linear-gradient(135deg,#1a3a5c,#2d6a9f);
      color:#fff; padding:16px 18px;
    }
    #panel-header h1 { font-size:15px; font-weight:700; margin-bottom:4px; }
    #panel-header p { font-size:11px; opacity:0.85; }
    #panel-body { flex:1; overflow-y:auto; padding:16px; }
    .section-title {
      font-size:11px; font-weight:700; color:#666;
      text-transform:uppercase; letter-spacing:1px;
      margin:14px 0 8px;
    }
    .indicator-btn {
      display:block; width:100%; text-align:left;
      padding:10px 12px; margin-bottom:6px; border-radius:6px;
      border:2px solid #e0e0e0; background:#fafafa;
      cursor:pointer; transition:all .2s; font-size:13px;
    }
    .indicator-btn:hover { border-color:#2d6a9f; background:#f0f6ff; }
    .indicator-btn.active { border-color:#2d6a9f; background:#2d6a9f; color:#fff; }
    .indicator-btn small {
      display:block; font-size:10px; margin-top:2px; opacity:0.7;
    }
    .indicator-btn.active small { opacity:0.85; }
    #legend { margin-top:6px; }
    .legend-title { font-size:12px; color:#444; margin-bottom:6px; font-weight:600; }
    .legend-bar {
      height:18px; border-radius:4px;
      background:linear-gradient(to right,#ffffcc,#c7e9b4,#7fcdbb,#41b6c4,#2c7fb8,#253494);
      margin-bottom:4px;
    }
    .legend-labels { display:flex; justify-content:space-between; font-size:10px; color:#666; }
    .legend-note { font-size:10px; color:#888; margin-top:6px; font-style:italic; }
    #info-box {
      margin-top:10px; padding:12px; border-radius:6px;
      background:#f7f9fc; border:1px solid #e0e8f0; font-size:12px;
    }
    #info-box .city-name { font-size:15px; font-weight:700; color:#1a3a5c; margin-bottom:8px; }
    #info-box .pref-name { font-size:11px; color:#888; margin-bottom:10px; }
    .info-row { display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid #eee; }
    .info-row:last-child { border-bottom:none; }
    .info-label { color:#666; }
    .info-value { font-weight:600; color:#1a3a5c; }
    #info-placeholder { color:#aaa; font-size:12px; text-align:center; padding:20px 0; }
    #loading {
      position:fixed; top:0; left:0; right:0; bottom:0;
      background:rgba(255,255,255,0.85); z-index:9999;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      font-size:16px; color:#333;
    }
    #loading-bar-wrap { width:280px; height:6px; background:#e0e0e0; border-radius:3px; margin-top:16px; }
    #loading-bar { height:100%; width:0%; background:#2d6a9f; border-radius:3px; transition:width .3s; }
    .leaflet-container { background:#d0e8f0; }
    #error-box {
      display:none; padding:14px; background:#fff3f3; border:1px solid #f5a0a0;
      border-radius:6px; font-size:12px; color:#c00; margin-top:10px; line-height:1.6;
    }
  </style>
</head>

<div id="loading">
  <div style="font-size:18px;font-weight:bold;color:#1a3a5c;">財政指標マップ</div>

  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>

</div>

<div id="map"></div>

<div id="panel">
  <div id="panel-header">
    <h1>📊 財政指標マップ</h1>
    <p>令和６年度｜全市区町村（総務省データ）</p>
  </div>
  <div id="panel-body">
    <div class="section-title">指標を選択</div>
    <button class="indicator-btn active" data-key="fiscal" onclick="switchIndicator(this)">
      財政力指数
      <small>高いほど財政が豊か（基準:1.0）</small>
    </button>
    <button class="indicator-btn" data-key="keijo" onclick="switchIndicator(this)">
      経常収支比率（%）
      <small>低いほど財政に余裕がある</small>
    </button>
    <button class="indicator-btn" data-key="jisshit" onclick="switchIndicator(this)">
      実質公債費比率（%）
      <small>低いほど借金返済負担が小さい</small>
    </button>
    <button class="indicator-btn" data-key="shorai" onclick="switchIndicator(this)">
      将来負担比率（%）
      <small>低いほど将来の財政負担が小さい</small>
    </button>
    <button class="indicator-btn" data-key="laspeyres" onclick="switchIndicator(this)">
      ラスパイレス指数
      <small>国家公務員給与との比較（基準:100）</small>
    </button>

    <div class="section-title">凡例</div>
    <div id="legend">
      <div class="legend-bar"></div>
      <div class="legend-labels">
        <span id="legend-min"></span>
        <span id="legend-mid"></span>
        <span id="legend-max"></span>
      </div>
      <div class="legend-note" id="legend-note"></div>
    </div>

    <div id="error-box" id="error-box">

      インターネット接続を確認してください。<br><br>
      または、<a href="https://github.com/smartnews-smri/japan-topography/raw/main/data/municipality/geojson/s0010/N03-21_210101.json" target="_blank">こちら</a>からGeoJSONをダウンロードし、<code>municipalities.geojson</code>という名前でHTMLと同じフォルダに置いてください。
    </div>

    <div class="section-title">市区町村情報</div>
    <div id="info-box">
      <div id="info-placeholder">地図上の市区町村にカーソルを合わせてください</div>
      <div id="info-content" style="display:none">
        <div class="city-name" id="info-name"></div>
        <div class="pref-name" id="info-pref"></div>

      </div>
    </div>
  </div>
</div>

// コードをキーにした辞書
const dataByCode = {};
MUNICIPALITIES.forEach(d => { dataByCode[d.code] = d; });

// 名前をキーにした辞書（コードマッチ失敗時の保険）
const dataByName = {};
MUNICIPALITIES.forEach(d => { dataByName[d.name] = d; });

// GeoJSONプロパティから自動でコードフィールド・名前フィールドを検出
let geoCodeField = null;
let geoNameField = null;
let geoPrefField = null;

function detectFields(feature) {
  const p = feature.properties;
  // コードフィールド：5桁数字の文字列を探す
  for (const [k, v] of Object.entries(p)) {
    if (typeof v === 'string' && /^\d{5}$/.test(v.trim())) {
      geoCodeField = k; break;
    }
  }
  // 名前フィールド：よく使われる候補順に確認
  const nameCandidates = ['N03_004','cityName','city','name','市区町村名','name_ja'];
  for (const k of nameCandidates) {
    if (p[k] !== undefined) { geoNameField = k; break; }
  }
  // 都道府県フィールド
  const prefCandidates = ['N03_001','prefName','pref','prefecture','都道府県名','pref_ja'];
  for (const k of prefCandidates) {
    if (p[k] !== undefined) { geoPrefField = k; break; }
  }
  console.log('検出フィールド:', { geoCodeField, geoNameField, geoPrefField });
  console.log('サンプルプロパティ:', p);
}

function findMunicipalityData(feature) {
  const p = feature.properties;
  // コードで検索
  if (geoCodeField) {
    const code = (p[geoCodeField] || '').toString().trim();
    if (dataByCode[code]) return dataByCode[code];
  }
  // 名前で検索
  if (geoNameField) {
    const name = (p[geoNameField] || '').toString().trim();
    if (dataByName[name]) return dataByName[name];
  }
  return null;
}

// ===== 指標設定 =====
const INDICATORS = {
  fiscal:    { label:'財政力指数',       unit:'',   colors:['#ffffcc','#c7e9b4','#7fcdbb','#41b6c4','#2c7fb8','#253494'], note:'1.0以上が財政力豊か' },
  keijo:     { label:'経常収支比率',     unit:'%',  colors:['#253494','#2c7fb8','#41b6c4','#7fcdbb','#c7e9b4','#ffffcc'], note:'低いほど財政に余裕（反転表示）' },
  jisshit:   { label:'実質公債費比率',   unit:'%',  colors:['#253494','#2c7fb8','#41b6c4','#7fcdbb','#c7e9b4','#ffffcc'], note:'18%以上で財政状況要注意' },
  shorai:    { label:'将来負担比率',     unit:'%',  colors:['#253494','#2c7fb8','#41b6c4','#7fcdbb','#c7e9b4','#ffffcc'], note:'データなし=健全（350%超で早期健全化）' },
  laspeyres: { label:'ラスパイレス指数', unit:'',   colors:['#ffffcc','#c7e9b4','#7fcdbb','#41b6c4','#2c7fb8','#253494'], note:'100が国家公務員水準' },
};

// 分位点（6段階）
const QUANTILES = {
  fiscal:    [0.06,0.22,0.32,0.44,0.59,0.75,1.99],
  keijo:     [52.8,84.9,89.2,91.5,93.7,96.3,129.8],
  jisshit:   [-7.4,3.9,6.0,7.6,8.9,10.8,68.1],
  shorai:    [0.0,10.9,22.5,35.5,50.7,73.9,245.6],
  laspeyres: [76.9,94.6,96.1,97.2,98.2,99.4,103.5],
};

let currentKey = 'fiscal';
let geojsonLayer = null;
let allGeoData = null;

// ===== Leafletマップ初期化 =====
const map = L.map('map', { zoomControl: true }).setView([36.5, 137.5], 5);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a> | 財政データ: 総務省 令和６年度',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

// ===== カラー計算 =====
function getColor(value, key) {
  if (value === null || value === undefined) return '#cccccc';
  const q = QUANTILES[key];
  const colors = INDICATORS[key].colors;
  for (let i = 0; i < q.length - 1; i++) {
    if (value <= q[i+1]) return colors[i];
  }
  return colors[colors.length - 1];
}

// ===== スタイル =====
function style(feature) {
  const d = findMunicipalityData(feature);
  const value = d ? d[currentKey] : null;
  return {
    fillColor: getColor(value, currentKey),
    weight: 0.4,
    opacity: 1,
    color: '#888',
    fillOpacity: 0.85
  };
}

// ===== ホバーイベント =====
function onEachFeature(feature, layer) {
  layer.on({
    mouseover: function(e) {
      const lyr = e.target;
      lyr.setStyle({ weight:2, color:'#333', fillOpacity:1 });
      lyr.bringToFront();

      const d = findMunicipalityData(feature);
      const name = (geoNameField ? feature.properties[geoNameField] : null) || d?.name || '不明';
      const pref = (geoPrefField ? feature.properties[geoPrefField] : null) || d?.pref || '';

      document.getElementById('info-placeholder').style.display = 'none';
      document.getElementById('info-content').style.display = 'block';
      document.getElementById('info-name').textContent = name;
      document.getElementById('info-pref').textContent = pref;

      const fmt = (v, unit) => v !== null && v !== undefined ? v + unit : 'データなし';
      document.getElementById('v-fiscal').textContent    = fmt(d?.fiscal, '');
      document.getElementById('v-keijo').textContent     = fmt(d?.keijo, '%');
      document.getElementById('v-jisshit').textContent   = fmt(d?.jisshit, '%');
      document.getElementById('v-shorai').textContent    = fmt(d?.shorai, '%');
      document.getElementById('v-laspeyres').textContent = fmt(d?.laspeyres, '');
    },
    mouseout: function(e) {
      geojsonLayer.resetStyle(e.target);
    },
    click: function(e) {
      map.fitBounds(e.target.getBounds(), { padding:[20,20] });
    }
  });
}

// ===== GeoJSON読み込み =====
function setProgress(pct) {
  document.getElementById('loading-bar').style.width = pct + '%';
}

function setMsg(msg) {
  document.getElementById('loading-msg').textContent = msg;
}

function showError(detail) {
  document.getElementById('loading').style.display = 'none';
  const box = document.getElementById('error-box');
  box.style.display = 'block';
  if (detail) box.innerHTML += '<br><small>詳細: ' + detail + '</small>';
}

function loadGeoJSON() {
  setProgress(10);
  const urls = [
    './municipalities.geojson',
    'https://raw.githubusercontent.com/smartnews-smri/japan-topography/main/data/municipality/geojson/s0010/N03-21_210101.json'
  ];

  function tryLoad(idx) {
    if (idx >= urls.length) {
      showError('すべてのURLが失敗しました');
      return;
    }
    const label = idx === 0 ? 'ローカルファイル' : '外部サーバー';
    setMsg('地図データを読み込み中... (' + label + ')');
    setProgress(10 + idx * 10);

    fetch(urls[idx])
      .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        setMsg('データを解析中... (大きいファイルのため少しお待ちください)');
        setProgress(40);
        return r.json();
      })
      .then(geojson => {
        setMsg('地図を描画中...');
        setProgress(80);
        allGeoData = geojson;

        // プロパティ名を自動検出
        if (geojson.features && geojson.features.length > 0) {
          detectFields(geojson.features[0]);
        }

        renderLayer();
        setProgress(100);
        setMsg('完了！');
        setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 500);
      })
      .catch(err => {
        console.warn('URL失敗 [' + idx + ']:', urls[idx], err.message);
        tryLoad(idx + 1);
      });
  }
  tryLoad(0);
}

function renderLayer() {
  if (geojsonLayer) { map.removeLayer(geojsonLayer); }
  geojsonLayer = L.geoJSON(allGeoData, {
    style: style,
    onEachFeature: onEachFeature
  }).addTo(map);
}

// ===== 凡例更新 =====
function updateLegend(key) {
  const q = QUANTILES[key];
  const ind = INDICATORS[key];
  document.getElementById('legend-min').textContent = q[0] + ind.unit;
  document.getElementById('legend-mid').textContent = q[3] + ind.unit;
  document.getElementById('legend-max').textContent = q[6] + ind.unit;
  document.getElementById('legend-note').textContent = ind.note;
  // グラデーションバー色更新
  document.querySelector('.legend-bar').style.background =
    'linear-gradient(to right,' + ind.colors.join(',') + ')';
}

// ===== 指標切替 =====
function switchIndicator(btn) {
  document.querySelectorAll('.indicator-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentKey = btn.dataset.key;
  updateLegend(currentKey);
  if (allGeoData) renderLayer();
}

// ===== 初期化 =====
updateLegend('fiscal');
loadGeoJSON();
</script>
